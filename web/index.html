<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>tclaw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html,
    body {
      height: 100%;
      overflow: hidden;
    }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
    }

    .top-pane,
    .bottom-pane {
      flex: 0 0 auto;
    }

    .header {
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 16px; color: #e94560; }
    .header .session-name { color: #53a8b6; font-size: 13px; }
    .header .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header select {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
    }
    .header .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .status-ready { background: #2d6a4f; color: #95d5b2; }
    .status-busy { background: #7f4f24; color: #ddb892; }
    .status-disconnected { background: #6c757d; color: #dee2e6; }

    .sessions-bar {
      padding: 6px 16px;
      background: #0f3460;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .sessions-bar .dir {
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    /* default state = stopped: just a folder, no live tmux session */
    .sessions-bar button {
      background: #16213e;
      color: #8a93a8;
      border: 1px solid #1a1a2e;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .sessions-bar button:hover { background: #1a1a2e; }
    /* running = live tmux session for this folder */
    .sessions-bar button.running { border-color: #2d6a4f; color: #95d5b2; }
    /* active = the session currently shown (wins over running) */
    .sessions-bar button.active { border-color: #e94560; color: #e94560; }
    .sessions-bar .stop-btn {
      padding: 4px 6px;
      color: #ddb892;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .sessions-bar .new-btn { color: #95d5b2; border-color: #2d6a4f; }

    /* The terminal view: a plain scrollable element. ansi_up paints the
       tmux capture-pane snapshot here, so scrolling is the browser's
       native scroll — smooth on mobile, unlike a canvas terminal. */
    .output {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.4;
      outline: none;
      background: #1a1a2e;
      /* allow native selection + the iOS "Copy" callout */
      user-select: text;
      -webkit-user-select: text;
      -webkit-touch-callout: default;
    }
    .output.disconnected { opacity: 0.6; }
    .output.paused { opacity: 0.82; }
    .output a { color: #7dd3fc; text-decoration: underline; }

    .mobile-composer {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #10192f;
      border-top: 1px solid #0f3460;
      align-items: flex-end;
    }
    .mobile-composer textarea {
      flex: 1;
      min-height: 38px;
      max-height: 126px;
      overflow-y: hidden;
      resize: none;
      border: 1px solid #0f3460;
      border-radius: 18px;
      background: #f8fafc;
      color: #152238;
      padding: 9px 12px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.3;
      outline: none;
    }
    .mobile-composer button {
      height: 38px;
      min-width: 52px;
      border: none;
      border-radius: 18px;
      background: #2d6a4f;
      color: #ffffff;
      padding: 0 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    @media (hover: none), (pointer: coarse) {
      .output {
        font-size: 12px;
        line-height: 1.3;
        padding: 8px 10px;
        overflow-x: auto;
        white-space: pre;
        word-wrap: normal;
      }
      .keys-bar button {
        min-width: 0;
        padding: 0 8px;
        font-size: 11px;
        flex: 0 0 auto;
      }
    }
    .keys-bar {
      display: flex;
      padding: 4px 16px;
      background: #16213e;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .arrow-pad {
      display: grid;
      grid-template-columns: repeat(3, 36px);
      grid-template-areas:
        ". up ."
        "left down right";
      gap: 4px;
      align-items: center;
    }
    .arrow-pad button {
      padding: 0;
    }
    .arrow-up { grid-area: up; }
    .arrow-left { grid-area: left; }
    .arrow-down { grid-area: down; }
    .arrow-right { grid-area: right; }
    .keys-bar .hint {
      color: #53a8b6;
      font-size: 12px;
      align-self: center;
    }
    .keys-bar .spacer { flex: 1; }
    .keys-bar button {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      height: 34px;
      padding: 0 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      min-width: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .keys-bar button:hover { border-color: #e94560; color: #e94560; }
    .keys-bar button:focus,
    .keys-bar button:active {
      background: #1a1a2e;
      color: #e0e0e0;
      border-color: #0f3460;
      outline: none;
      box-shadow: none;
    }
    .keys-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .keys-bar button.active {
      border-color: #e94560;
      color: #e94560;
    }
    /* the sync-paused toggle stands out when paused */
    .keys-bar button.paused-on {
      border-color: #7f4f24;
      color: #ddb892;
    }
    .keys-bar .composer-toggle {
      font-size: 24px;
      line-height: 1;
      min-width: 48px;
      padding: 0 10px;
    }
    .upload-status {
      color: #95d5b2;
      font-size: 12px;
      align-self: center;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .upload-status.error { color: #ff9aa2; }
    .recording-bar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .recording-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #e94560;
      box-shadow: 0 0 0 4px rgba(233,69,96,0.16);
    }
    .recording-time {
      color: #ffb3bd;
      font-size: 12px;
      min-width: 34px;
    }
    .recording-action.cancel {
      color: #ff9aa2;
      border-color: #7f1d2d;
    }
    .recording-action.send {
      color: #95d5b2;
      border-color: #2d6a4f;
    }
    .keys-bar .recording-action {
      height: 34px;
      padding: 0 10px;
    }
    .keys-bar .recording-action.send:hover,
    .keys-bar .recording-action.send:focus,
    .keys-bar .recording-action.send:active {
      background: #1a1a2e;
      color: #95d5b2;
      border-color: #2d6a4f;
      outline: none;
      box-shadow: none;
    }
    .keys-bar .recording-action.cancel:hover,
    .keys-bar .recording-action.cancel:focus,
    .keys-bar .recording-action.cancel:active {
      background: #1a1a2e;
      color: #ff9aa2;
      border-color: #7f1d2d;
      outline: none;
      box-shadow: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 24px;
      width: min(400px, 100%);
      max-width: 100%;
    }
    .modal h2 { margin-bottom: 16px; color: #e94560; font-size: 16px; }
    .modal input {
      width: 100%;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .modal .error {
      color: #ff9aa2;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal .actions button {
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .modal .actions .cancel { background: #6c757d; color: white; }
    .modal .actions .confirm { background: #e94560; color: white; }
    @media (max-width: 420px) {
      .modal {
        padding: 16px;
      }
      .modal .actions {
        justify-content: stretch;
      }
      .modal .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js",
      "ansi_up": "https://cdn.jsdelivr.net/npm/ansi_up@6.0.2/ansi_up.js"
    }
  }
</script>

<div id="app">
  <div class="top-pane">
    <div class="header">
      <h1>tclaw</h1>
      <div class="controls">
        <span class="session-name" v-if="activeSession">{{ activeSession }}</span>
        <select v-model="harness" @change="saveHarness">
          <option value="claude">claude</option>
          <option value="codex">codex</option>
        </select>
        <span class="status" :class="statusClass">{{ statusText }}</span>
      </div>
    </div>

    <div class="sessions-bar">
      <span v-for="d in dirs" :key="d.name" class="dir">
        <button
          :class="{ active: d.session === activeSession, running: d.running }"
          @click="openDir(d)"
        >{{ d.name }}</button>
        <button
          v-if="d.running"
          class="stop-btn"
          @click.stop="stopSession(d.session)"
          title="Detener sesión"
        >&#9209;</button>
      </span>
      <button class="new-btn" @click="showNewModal = true">+ new</button>
    </div>
  </div>

  <div
    class="output"
    :class="{ disconnected: !connected, paused: paused }"
    ref="outputEl"
    @scroll="flushPending"
    v-html="outputHtml"
  ></div>

  <div class="bottom-pane">
    <div class="mobile-composer" v-show="showMobileComposer">
      <textarea
        ref="mobileComposerEl"
        v-model="mobileComposerText"
        rows="1"
        placeholder="Message"
        @input="resizeMobileComposer"
        @keydown.enter.exact.prevent="sendMobileComposer"
      ></textarea>
      <button @click="sendMobileComposer" :disabled="!activeSession">Send</button>
    </div>

    <div class="keys-bar">
      <template v-if="isRecording">
        <span class="recording-bar">
          <span class="recording-dot"></span>
          <span class="recording-time">{{ recordingDurationText }}</span>
          <button class="recording-action cancel" @click="cancelVoiceRecording">Cancel</button>
          <button class="recording-action send" @click="finishVoiceRecording">Send</button>
        </span>
      </template>
      <template v-else>
        <button @click="toggleActionSet">⇄</button>
        <button
          class="composer-toggle"
          :class="{ active: showMobileComposer }"
          @click="toggleComposer"
          title="Mostrar/ocultar campo de texto"
        >⌨</button>
        <template v-if="actionSet === 'main'">
          <button @click="startVoiceRecording" :disabled="!activeSession || uploadInProgress">Mic</button>
          <button @click="triggerImageUpload" :disabled="!activeSession || uploadInProgress">Img</button>
          <button
            :class="{ 'paused-on': paused }"
            @click="toggleSync"
            :disabled="!connected"
            :title="paused ? 'Reanudar sync con tmux' : 'Pausar sync con tmux'"
          >{{ paused ? '▶ Sync' : '⏸ Sync' }}</button>
          <button
            @click="sendResize()"
            :disabled="!connected"
            title="Ajustar tmux al ancho de la pantalla"
          >↔ Fit</button>
          <button @click="copyOutput" :disabled="!activeSession">{{ copied ? '✓' : 'Copy' }}</button>
          <button @click="sendInput('/clear')" :disabled="!activeSession">Clear</button>
        </template>
        <template v-else>
          <span class="arrow-pad">
            <button class="arrow-up" @click="sendKey('Up')" :disabled="!activeSession">↑</button>
            <button class="arrow-left" @click="sendKey('Left')" :disabled="!activeSession">←</button>
            <button class="arrow-down" @click="sendKey('Down')" :disabled="!activeSession">↓</button>
            <button class="arrow-right" @click="sendKey('Right')" :disabled="!activeSession">→</button>
          </span>
          <button @click="sendKey('Enter')" :disabled="!activeSession">↵</button>
          <button @click="sendKey('Tab')" :disabled="!activeSession">Tab</button>
          <button @click="sendKey('Escape')" :disabled="!activeSession">Esc</button>
          <button @click="sendKey('BSpace')" :disabled="!activeSession">⌫</button>
          <button @click="sendKey('Delete')" :disabled="!activeSession">Del</button>
          <button @click="sendKey('C-c')" :disabled="!activeSession">Ctrl+C</button>
          <button @click="sendKey('C-b')" :disabled="!activeSession">Ctrl+B</button>
          <button @click="sendKey('C-d')" :disabled="!activeSession">Ctrl+D</button>
          <button @click="sendKey('C-l')" :disabled="!activeSession">Ctrl+L</button>
          <button @click="sendKey('C-u')" :disabled="!activeSession">Ctrl+U</button>
          <button @click="sendKey('C-w')" :disabled="!activeSession">Ctrl+W</button>
        </template>
        <button @click="insertComposerNewline" :disabled="!activeSession">NL</button>
      </template>
      <input ref="imageInputEl" type="file" accept="image/*" multiple style="display:none" @change="handleImageSelected" />
      <span class="upload-status" :class="{ error: uploadError }">{{ uploadStatusText }}</span>
    </div>
  </div>

  <!-- New session modal -->
  <div class="modal-overlay" v-if="showNewModal" @click.self="showNewModal = false">
    <div class="modal">
      <h2>New session</h2>
      <input
        v-model="newDir"
        @keydown.enter="createFromModal"
        placeholder="/path/to/project"
        ref="newDirInput"
      />
      <div class="error" v-if="newSessionError">{{ newSessionError }}</div>
      <div class="actions">
        <button class="cancel" @click="showNewModal = false">Cancel</button>
        <button class="confirm" @click="createFromModal">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" v-if="showAuthModal" @click.self="authTokenInput = authTokenInput.trim()">
    <div class="modal">
      <h2>Token</h2>
      <input
        v-model="authTokenInput"
        @keydown.enter="saveAuthToken"
        placeholder="AUTH_TOKEN"
      />
      <div class="error" v-if="authError">{{ authError }}</div>
      <div class="actions">
        <button class="confirm" @click="saveAuthToken">Save</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createApp, computed, ref, nextTick, watch, onMounted, onBeforeUnmount } from 'vue'
  import { AnsiUp } from 'ansi_up'

  createApp({
    setup() {
      const dirs = ref([])             // [{ name, session, running }]
      const activeSession = ref(null)  // sanitized session name currently shown
      const defaultSession = ref('agent')
      const output = ref('')           // latest tmux capture-pane snapshot
      const connected = ref(false)
      const paused = ref(false)        // true = tmux sync polling is paused
      const harness = ref('claude')
      const showNewModal = ref(false)
      const showAuthModal = ref(false)
      const newDir = ref('')
      const newSessionError = ref('')
      const authError = ref('')
      const authTokenInput = ref(localStorage.getItem('tclaw_auth_token') || '')
      const uploadProgress = ref(0)
      const uploadInProgress = ref(false)
      const uploadError = ref('')
      const copied = ref(false)
      const isRecording = ref(false)
      const recordingSeconds = ref(0)
      const showMobileComposer = ref(localStorage.getItem('tclaw_show_composer') === '1')
      const mobileComposerText = ref('')
      const actionSetStorageKey = 'tclaw_action_set'
      const actionSet = ref(localStorage.getItem(actionSetStorageKey) || 'main')
      const outputEl = ref(null)
      const mobileComposerEl = ref(null)
      const newDirInput = ref(null)
      const imageInputEl = ref(null)

      let ws = null
      let reconnectTimer = null
      let reconnectAttempts = 0
      let mediaRecorder = null
      let recordingStream = null
      let micStream = null
      let recordingChunks = []
      let recordingTimer = null
      let resizeDebounce = null
      const apiBase = window.location.origin
      const authStorageKey = 'tclaw_auth_token'

      const statusClass = ref('status-disconnected')
      const statusText = ref('disconnected')

      function updateStatus() {
        if (!connected.value) {
          statusClass.value = 'status-disconnected'
          statusText.value = 'disconnected'
        } else if (paused.value) {
          statusClass.value = 'status-busy'
          statusText.value = 'sync pausado'
        } else {
          statusClass.value = 'status-ready'
          statusText.value = 'connected'
        }
      }

      // --- terminal render ---------------------------------------------------

      // ansi_up carries SGR colour state across calls — it is built to parse
      // a continuous stream. We hand it a whole capture-pane snapshot each
      // time, so a shared instance would bleed one snapshot's trailing colour
      // into the start of the next. A fresh instance per render stays pure.
      function renderAnsi(text) {
        return new AnsiUp().ansi_to_html(text || '')
      }

      const outputHtml = computed(() => renderAnsi(output.value))

      // pendingText holds the latest snapshot left unpainted because the user
      // is reading scrollback or selecting text. Painting replaces the whole
      // DOM subtree, which yanks the scroll position and kills any selection —
      // so we freeze the view and flush once they are back at the bottom.
      // (The pause button stops the server poll entirely; this is the
      // automatic, client-side counterpart.)
      let pendingText = null

      function nearBottom(el) {
        return el.scrollHeight - el.scrollTop - el.clientHeight < 48
      }

      // selectingOutput: the user has an active selection inside the terminal.
      function selectingOutput(el) {
        const sel = window.getSelection && window.getSelection()
        if (!sel || sel.isCollapsed || sel.rangeCount === 0) return false
        return el.contains(sel.anchorNode) || el.contains(sel.focusNode)
      }

      function paintOutput(text) {
        output.value = text || ''
        nextTick(() => {
          const e = outputEl.value
          if (e) e.scrollTop = e.scrollHeight
        })
      }

      // applyOutput paints a snapshot only while the user is following the
      // bottom and not selecting; otherwise it buffers it (pendingText) and
      // leaves the view — and the scroll position — untouched.
      function applyOutput(text) {
        const next = text || ''
        if (next === output.value) {
          pendingText = null
          return
        }
        const el = outputEl.value
        if (!el) {
          output.value = next
          return
        }
        if (!nearBottom(el) || selectingOutput(el)) {
          pendingText = next
          return
        }
        pendingText = null
        paintOutput(next)
      }

      // flushPending paints a buffered snapshot once the user returns to the
      // bottom with no active selection. Wired to scroll + selectionchange.
      function flushPending() {
        if (pendingText === null) return
        const el = outputEl.value
        if (!el || !nearBottom(el) || selectingOutput(el)) return
        const t = pendingText
        pendingText = null
        paintOutput(t)
      }

      // computeSize measures the .output box in character cells so we can
      // resize the tmux window to the real screen width.
      function computeSize() {
        const el = outputEl.value
        if (!el || !el.clientWidth) return null
        const probe = document.createElement('span')
        probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;'
        probe.textContent = 'M'.repeat(100)
        el.appendChild(probe)
        const charW = probe.getBoundingClientRect().width / 100
        el.removeChild(probe)
        const cs = getComputedStyle(el)
        const lineH = parseFloat(cs.lineHeight) || (parseFloat(cs.fontSize) * 1.3)
        const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight)
        const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom)
        if (!charW || !lineH) return null
        return {
          cols: Math.max(20, Math.floor((el.clientWidth - padX) / charW)),
          rows: Math.max(10, Math.floor((el.clientHeight - padY) / lineH)),
        }
      }

      // --- websocket / input -------------------------------------------------

      function sendInput(text, submitKey = 'Enter') {
        if (!ws || ws.readyState !== WebSocket.OPEN || !text) return
        ws.send(JSON.stringify({ type: 'input', text, submit_key: submitKey }))
      }

      function sendText(text) {
        if (!ws || ws.readyState !== WebSocket.OPEN || !text) return
        ws.send(JSON.stringify({ type: 'text', text }))
      }

      function sendKey(name) {
        if (!ws || ws.readyState !== WebSocket.OPEN || !name) return
        ws.send(JSON.stringify({ type: 'key', text: name }))
      }

      // sendResize tells tmux to resize the window to the screen width.
      // Called automatically on connect / orientation change, and manually
      // from the Fit button.
      function sendResize() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return
        const size = computeSize()
        if (!size) return
        ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }))
      }

      // toggleSync pauses / resumes the tmux capture-pane polling.
      function toggleSync() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return
        ws.send(JSON.stringify({ type: paused.value ? 'resume' : 'pause' }))
      }

      async function copyOutput() {
        const sel = (window.getSelection && window.getSelection().toString()) || ''
        const text = sel || output.value
        if (!text) return
        try {
          await navigator.clipboard.writeText(text)
          copied.value = true
          setTimeout(() => { copied.value = false }, 1200)
        } catch {
          uploadError.value = 'No se pudo copiar'
        }
      }

      function currentAuthToken() {
        return authTokenInput.value.trim()
      }

      function authHeaders(extra = {}) {
        const token = currentAuthToken()
        if (!token) return extra
        return { ...extra, Authorization: `Bearer ${token}` }
      }

      function setUnauthorized() {
        authError.value = currentAuthToken() ? 'Invalid token' : ''
        showAuthModal.value = true
      }

      async function apiFetch(path, options = {}) {
        const opts = { ...options }
        opts.headers = authHeaders(options.headers || {})
        const res = await fetch(`${apiBase}${path}`, opts)
        if (res.status === 401) {
          setUnauthorized()
        }
        return res
      }

      async function saveAuthToken() {
        localStorage.setItem(authStorageKey, currentAuthToken())
        authError.value = ''
        showAuthModal.value = false
        await fetchConfig()
        await fetchDirs()
        await routeFromURL()
      }

      async function fetchConfig() {
        const res = await apiFetch('/api/config')
        if (!res.ok) return
        const cfg = await res.json()
        harness.value = cfg.harness || 'claude'
        defaultSession.value = cfg.default_session || 'agent'
      }

      async function fetchDirs() {
        const res = await apiFetch('/api/dirs')
        if (!res.ok) return
        dirs.value = await res.json()
      }

      async function saveHarness() {
        await saveConfig()
      }

      async function saveConfig() {
        const res = await apiFetch('/api/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ harness: harness.value })
        })
        if (!res.ok) return null
        const cfg = await res.json()
        harness.value = cfg.harness || 'claude'
        return cfg
      }

      function cancelReconnect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer)
          reconnectTimer = null
        }
        reconnectAttempts = 0
      }

      function connectWS(name) {
        cancelReconnect()
        if (ws) {
          ws.close()
          ws = null
        }

        connected.value = false
        paused.value = false
        updateStatus()

        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
        const token = currentAuthToken()
        const url = new URL(`${proto}//${window.location.host}/ws/${encodeURIComponent(name)}`)
        if (token) {
          url.searchParams.set('token', token)
        }
        const newWs = new WebSocket(url.toString())
        ws = newWs
        let opened = false

        newWs.onopen = () => {
          if (ws !== newWs) return
          opened = true
          connected.value = true
          reconnectAttempts = 0
          updateStatus()
          // Match the tmux window to this device's screen width.
          nextTick(() => sendResize())
          fetchDirs()
        }

        newWs.onmessage = (e) => {
          if (ws !== newWs) return
          let msg
          try {
            msg = JSON.parse(e.data)
          } catch {
            return
          }
          if (msg.type === 'snapshot' || msg.type === 'update') {
            applyOutput(msg.text)
          } else if (msg.type === 'sync') {
            paused.value = !!msg.paused
            updateStatus()
          }
        }

        newWs.onclose = () => {
          if (ws !== newWs) return
          connected.value = false
          updateStatus()
          if (opened) {
            scheduleReconnect(name)
          } else {
            // Never connected — the session may have ended. Only retry if a
            // live session for it still exists.
            fetchDirs().then(() => {
              const d = dirs.value.find((x) => x.session === name)
              if (d && d.running) scheduleReconnect(name)
            })
          }
        }

        newWs.onerror = () => newWs.close()
      }

      function scheduleReconnect(name) {
        if (reconnectTimer) return
        if (activeSession.value !== name) return
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000)
        reconnectAttempts++
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null
          if (activeSession.value === name) {
            connectWS(name)
          }
        }, delay)
      }

      // --- session / directory routing --------------------------------------

      function sanitizeSessionName(dir) {
        let s = dir.normalize('NFD').replace(/[̀-ͯ]/g, '')
        s = s.replace(/[\/\\ ]/g, '-')
        s = s.replace(/[^a-zA-Z0-9-]/g, '')
        s = s.replace(/-{2,}/g, '-')
        s = s.replace(/^-+|-+$/g, '')
        s = s.toLowerCase()
        return s || 'session'
      }

      // selectSession points the UI + URL at a session and connects to it.
      function selectSession(name) {
        activeSession.value = name
        const path = '/' + encodeURIComponent(name)
        if (window.location.pathname !== path) {
          history.pushState({}, '', path)
        }
        output.value = ''
        pendingText = null
        connectWS(name)
      }

      // createSessionWithDir creates (or reuses) a session for a directory.
      async function createSessionWithDir(dir) {
        const res = await apiFetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir })
        })
        if (res.ok) {
          const s = await res.json()
          await fetchDirs()
          selectSession(s.name)
          return true
        }
        if (res.status === 409) {
          await fetchDirs()
          selectSession(sanitizeSessionName(dir))
          return true
        }
        return false
      }

      // openDir handles a tap on a directory in the bar.
      async function openDir(d) {
        if (d.running) {
          selectSession(d.session)
        } else {
          await createSessionWithDir(d.name)
        }
      }

      async function openSessionByName(name) {
        const d = dirs.value.find((x) => x.session === name)
        if (d) {
          await openDir(d)
          return
        }
        if (name === defaultSession.value) {
          // Default has no folder yet — create it.
          await createSessionWithDir(defaultSession.value)
          return
        }
        // Unknown path → fall back to the default session.
        await openSessionByName(defaultSession.value)
      }

      // routeFromURL resolves the current URL path to a session.
      async function routeFromURL() {
        const seg = decodeURIComponent(
          (window.location.pathname || '/').replace(/^\/+/, '').split('/')[0] || ''
        )
        await openSessionByName(seg || defaultSession.value)
      }

      // stopSession kills the tmux session. The folder stays; it just has no
      // live session anymore.
      async function stopSession(name) {
        await apiFetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' })
        if (activeSession.value === name) {
          cancelReconnect()
          if (ws) { ws.close(); ws = null }
          connected.value = false
          updateStatus()
          output.value = ''
          pendingText = null
        }
        await fetchDirs()
      }

      async function createFromModal() {
        const dir = newDir.value.trim()
        if (!dir) return
        newSessionError.value = ''
        const ok = await createSessionWithDir(dir)
        if (ok) {
          showNewModal.value = false
          newDir.value = ''
        } else {
          newSessionError.value = 'Could not create session'
          await fetchDirs()
        }
      }

      watch(showNewModal, (v) => {
        if (v) {
          newSessionError.value = ''
          nextTick(() => newDirInput.value?.focus())
        }
      })

      // --- composer / keys ---------------------------------------------------

      const uploadStatusText = computed(() => {
        if (uploadError.value) return uploadError.value
        if (uploadInProgress.value) return `${uploadProgress.value}%`
        return ''
      })

      const recordingDurationText = computed(() => {
        const minutes = Math.floor(recordingSeconds.value / 60)
        const seconds = recordingSeconds.value % 60
        return `${minutes}:${String(seconds).padStart(2, '0')}`
      })

      function resizeMobileComposer() {
        const el = mobileComposerEl.value
        if (!el) return
        el.style.height = 'auto'
        el.style.height = `${Math.min(el.scrollHeight, 126)}px`
        el.style.overflowY = el.scrollHeight > 126 ? 'auto' : 'hidden'
      }

      function toggleActionSet() {
        actionSet.value = actionSet.value === 'main' ? 'nav' : 'main'
        localStorage.setItem(actionSetStorageKey, actionSet.value)
      }

      function toggleComposer() {
        showMobileComposer.value = !showMobileComposer.value
        localStorage.setItem('tclaw_show_composer', showMobileComposer.value ? '1' : '0')
        if (showMobileComposer.value) {
          nextTick(() => {
            resizeMobileComposer()
            mobileComposerEl.value?.focus()
          })
        }
      }

      function sendMobileComposer() {
        if (!activeSession.value) return
        const text = mobileComposerText.value.trim()
        if (!text) {
          sendKey('Enter')
          nextTick(() => mobileComposerEl.value?.focus())
          return
        }
        sendInput(text)
        mobileComposerText.value = ''
        nextTick(() => {
          resizeMobileComposer()
          mobileComposerEl.value?.focus()
        })
      }

      function insertComposerNewline() {
        if (!activeSession.value) return
        // paste a newline into the harness input box without submitting
        sendInput('\n', 'none')
        nextTick(() => mobileComposerEl.value?.focus())
      }

      function focusComposer() {
        mobileComposerEl.value?.focus()
      }

      // --- uploads -----------------------------------------------------------

      function triggerImageUpload() {
        uploadError.value = ''
        imageInputEl.value?.click()
      }

      function handleImageSelected(event) {
        const files = Array.from(event.target.files || [])
        event.target.value = ''
        if (files.length === 0) return
        uploadImages(files)
      }

      // uploadOne posts a single file to the session's uploads endpoint and
      // resolves with the server's JSON response. onProgress (optional)
      // receives 0..100 as the upload streams.
      function uploadOne(file, onProgress) {
        return new Promise((resolve, reject) => {
          const form = new FormData()
          form.append('file', file)

          const xhr = new XMLHttpRequest()
          xhr.open('POST', `${apiBase}/api/sessions/${encodeURIComponent(activeSession.value)}/uploads`)
          const token = currentAuthToken()
          if (token) {
            xhr.setRequestHeader('Authorization', `Bearer ${token}`)
          }

          xhr.upload.onprogress = (event) => {
            if (event.lengthComputable && onProgress) {
              onProgress(Math.round((event.loaded / event.total) * 100))
            }
          }

          xhr.onload = () => {
            if (xhr.status === 401) {
              setUnauthorized()
              reject(new Error('unauthorized'))
              return
            }
            if (xhr.status < 200 || xhr.status >= 300) {
              reject(new Error((xhr.responseText || '').trim() || 'Upload failed'))
              return
            }
            try {
              resolve(JSON.parse(xhr.responseText))
            } catch {
              reject(new Error('Invalid upload response'))
            }
          }

          xhr.onerror = () => reject(new Error('Upload failed'))
          xhr.send(form)
        })
      }

      // uploadFile uploads a single file and dispatches the result. Used by
      // the voice flow (audio → transcript) and as the single-file primitive.
      async function uploadFile(file) {
        uploadError.value = ''
        uploadInProgress.value = true
        uploadProgress.value = 0
        try {
          const data = await uploadOne(file, (pct) => { uploadProgress.value = pct })
          uploadInProgress.value = false
          uploadProgress.value = 100
          if (data.transcript) {
            sendInput(`<transcript>${data.transcript}</transcript>`)
          } else {
            sendText(`@${data.full_path} `)
          }
          if (data.transcription_error && !data.transcript) {
            uploadError.value = data.transcription_error
          }
          nextTick(() => focusComposer())
          setTimeout(() => {
            if (!uploadInProgress.value) {
              uploadProgress.value = 0
              if (!data.transcription_error || data.transcript) {
                uploadError.value = ''
              }
            }
          }, 800)
        } catch (e) {
          uploadInProgress.value = false
          uploadError.value = e.message || 'Upload failed'
        }
      }

      // uploadImages uploads several images sequentially and then sends ONE
      // message to the harness referencing all of them:
      //     @/abs/p1 @/abs/p2 @/abs/p3
      // A mid-batch failure doesn't abort the rest; the successful paths are
      // still sent, and the status shows how many made it through.
      async function uploadImages(files) {
        uploadError.value = ''
        uploadInProgress.value = true
        uploadProgress.value = 0

        const paths = []
        let lastError = null

        for (let i = 0; i < files.length; i++) {
          try {
            const data = await uploadOne(files[i], (pct) => {
              uploadProgress.value = Math.round(((i + pct / 100) / files.length) * 100)
            })
            if (data.full_path) paths.push(data.full_path)
          } catch (e) {
            lastError = e
          }
        }

        uploadInProgress.value = false

        if (paths.length > 0) {
          sendText(paths.map((p) => `@${p}`).join(' ') + ' ')
          uploadProgress.value = 100
        } else {
          uploadProgress.value = 0
        }

        if (lastError && paths.length === 0) {
          uploadError.value = lastError.message || 'Upload failed'
        } else if (lastError) {
          uploadError.value = `${paths.length}/${files.length} subidos`
        }

        nextTick(() => focusComposer())
        setTimeout(() => {
          if (!uploadInProgress.value) {
            uploadProgress.value = 0
            if (paths.length > 0 && !lastError) uploadError.value = ''
          }
        }, 1000)
      }

      // --- voice recording ---------------------------------------------------

      function startRecordingTimer() {
        stopRecordingTimer()
        recordingTimer = window.setInterval(() => {
          recordingSeconds.value += 1
        }, 1000)
      }

      function stopRecordingTimer() {
        if (recordingTimer) {
          window.clearInterval(recordingTimer)
          recordingTimer = null
        }
      }

      function stopRecordingStream() {
        if (recordingStream && recordingStream !== micStream) {
          for (const track of recordingStream.getTracks()) {
            track.stop()
          }
        }
        recordingStream = null
      }

      function stopMicStream() {
        if (micStream) {
          for (const track of micStream.getTracks()) {
            track.stop()
          }
          micStream = null
        }
        recordingStream = null
      }

      function cleanupRecorder() {
        stopRecordingTimer()
        stopRecordingStream()
        mediaRecorder = null
        recordingChunks = []
        recordingSeconds.value = 0
      }

      async function getMicStream() {
        if (micStream && micStream.getAudioTracks().some((track) => track.readyState === 'live')) {
          return micStream
        }
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        return micStream
      }

      function microphoneErrorMessage(err) {
        if (!window.isSecureContext) {
          return 'Mic requires HTTPS or localhost'
        }
        if (!navigator.mediaDevices?.getUserMedia) {
          return 'Microphone is not supported here'
        }
        if (!window.MediaRecorder) {
          return 'Audio recording is not supported here'
        }
        if (err?.name === 'NotAllowedError' || err?.name === 'SecurityError') {
          return 'Microphone permission denied'
        }
        if (err?.name === 'NotFoundError' || err?.name === 'DevicesNotFoundError') {
          return 'No microphone found'
        }
        if (err?.name === 'NotReadableError' || err?.name === 'TrackStartError') {
          return 'Microphone is busy'
        }
        return err?.message || 'Could not start microphone'
      }

      async function startVoiceRecording() {
        if (isRecording.value || uploadInProgress.value) return

        uploadError.value = ''
        isRecording.value = false

        if (!window.isSecureContext || !navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
          uploadError.value = microphoneErrorMessage()
          cleanupRecorder()
          return
        }

        try {
          recordingStream = await getMicStream()
          const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm'

          mediaRecorder = new MediaRecorder(recordingStream, mimeType ? { mimeType } : undefined)
          recordingChunks = []
          recordingSeconds.value = 0

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              recordingChunks.push(event.data)
            }
          }

          mediaRecorder.onerror = () => {
            uploadError.value = 'Recording failed'
            isRecording.value = false
            cleanupRecorder()
          }

          mediaRecorder.start()
          isRecording.value = true
          startRecordingTimer()
        } catch (err) {
          isRecording.value = false
          uploadError.value = microphoneErrorMessage(err)
          cleanupRecorder()
        }
      }

      function cancelVoiceRecording() {
        if (!mediaRecorder) {
          isRecording.value = false
          cleanupRecorder()
          return
        }
        const recorder = mediaRecorder
        recorder.onstop = null
        if (recorder.state !== 'inactive') {
          recorder.stop()
        }
        isRecording.value = false
        cleanupRecorder()
      }

      function finishVoiceRecording() {
        if (!mediaRecorder) {
          isRecording.value = false
          cleanupRecorder()
          return
        }

        const recorder = mediaRecorder
        recorder.onstop = () => {
          const blob = new Blob(recordingChunks, { type: recorder.mimeType || 'audio/webm' })
          const extension = blob.type.includes('ogg') ? 'ogg' : 'webm'
          const file = new File([blob], `voice-note.${extension}`, { type: blob.type || 'audio/webm' })

          isRecording.value = false
          cleanupRecorder()
          uploadFile(file)
        }

        if (recorder.state !== 'inactive') {
          recorder.stop()
        }
      }

      // --- lifecycle ---------------------------------------------------------

      function reconnectIfNeeded() {
        if (!activeSession.value) return
        if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
          cancelReconnect()
          connectWS(activeSession.value)
        }
      }

      function onVisibilityChange() {
        if (document.visibilityState === 'visible') {
          reconnectIfNeeded()
        }
      }

      function onOnline() {
        reconnectIfNeeded()
      }

      function onPopState() {
        routeFromURL()
      }

      function onWindowResize() {
        if (resizeDebounce) clearTimeout(resizeDebounce)
        resizeDebounce = setTimeout(() => {
          resizeDebounce = null
          sendResize()
        }, 300)
      }

      onMounted(() => {
        document.addEventListener('visibilitychange', onVisibilityChange)
        window.addEventListener('online', onOnline)
        window.addEventListener('popstate', onPopState)
        window.addEventListener('resize', onWindowResize)
        document.addEventListener('selectionchange', flushPending)
        ;(async () => {
          await fetchConfig()
          await fetchDirs()
          await routeFromURL()
        })()
        nextTick(() => resizeMobileComposer())
      })

      onBeforeUnmount(() => {
        document.removeEventListener('visibilitychange', onVisibilityChange)
        window.removeEventListener('online', onOnline)
        window.removeEventListener('popstate', onPopState)
        window.removeEventListener('resize', onWindowResize)
        document.removeEventListener('selectionchange', flushPending)
        if (resizeDebounce) clearTimeout(resizeDebounce)
        cancelReconnect()
        cancelVoiceRecording()
        stopMicStream()
      })

      return {
        dirs, activeSession, defaultSession, output, outputHtml, connected, paused, harness,
        showNewModal, showAuthModal, newDir, newSessionError, authError, authTokenInput,
        uploadProgress, uploadInProgress, uploadError, uploadStatusText, copied,
        isRecording, recordingDurationText, showMobileComposer, mobileComposerText, actionSet,
        outputEl, mobileComposerEl, newDirInput, imageInputEl,
        statusClass, statusText,
        openDir, stopSession, createFromModal, sendKey, sendText, sendInput,
        sendResize, toggleSync, copyOutput, flushPending,
        triggerImageUpload, handleImageSelected, startVoiceRecording, cancelVoiceRecording,
        finishVoiceRecording, saveHarness, saveAuthToken, resizeMobileComposer, toggleActionSet,
        toggleComposer, sendMobileComposer, insertComposerNewline
      }
    }
  }).mount('#app')
</script>

</body>
</html>
