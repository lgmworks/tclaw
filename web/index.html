<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>tclaw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html,
    body {
      height: 100%;
      overflow: hidden;
    }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
    }

    .top-pane,
    .bottom-pane {
      flex: 0 0 auto;
    }

    .header {
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 16px; color: #e94560; }
    .header .session-name { color: #53a8b6; font-size: 13px; }
    .header .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header select {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
    }
    .header .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .status-ready { background: #2d6a4f; color: #95d5b2; }
    .status-busy { background: #7f4f24; color: #ddb892; }
    .status-disconnected { background: #6c757d; color: #dee2e6; }

    .sessions-bar {
      padding: 6px 16px;
      background: #0f3460;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .sessions-bar button {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #1a1a2e;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      touch-action: manipulation;
    }
    .sessions-bar button:hover { background: #1a1a2e; }
    .sessions-bar button.active { border-color: #e94560; color: #e94560; }
    .sessions-bar .new-btn { color: #95d5b2; border-color: #2d6a4f; }

    .output {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.4;
      outline: none;
    }
    .output:focus { box-shadow: inset 0 0 0 1px #e94560; }
    .output.disconnected { opacity: 0.7; }
    .output a {
      color: #7dd3fc;
      text-decoration: underline;
    }
    .mobile-composer {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #10192f;
      border-top: 1px solid #0f3460;
      align-items: flex-end;
    }
    .mobile-composer textarea {
      flex: 1;
      min-height: 38px;
      max-height: 126px;
      overflow-y: hidden;
      resize: none;
      border: 1px solid #0f3460;
      border-radius: 18px;
      background: #f8fafc;
      color: #152238;
      padding: 9px 12px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.3;
      outline: none;
    }
    .mobile-composer button {
      height: 38px;
      min-width: 52px;
      border: none;
      border-radius: 18px;
      background: #2d6a4f;
      color: #ffffff;
      padding: 0 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    @media (hover: hover) and (pointer: fine) {
      .mobile-composer,
      .composer-toggle {
        display: none;
      }
    }
    @media (hover: none), (pointer: coarse) {
      .output {
        font-size: 12px;
        line-height: 1.3;
        padding: 8px 10px;
        overflow-x: auto;
        white-space: pre;
        word-wrap: normal;
      }
    }
    .keys-bar {
      display: flex;
      padding: 4px 16px;
      background: #16213e;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .arrow-pad {
      display: grid;
      grid-template-columns: repeat(3, 36px);
      grid-template-areas:
        ". up ."
        "left down right";
      gap: 4px;
      align-items: center;
    }
    .arrow-pad button {
      padding: 0;
    }
    .arrow-up { grid-area: up; }
    .arrow-left { grid-area: left; }
    .arrow-down { grid-area: down; }
    .arrow-right { grid-area: right; }
    .keys-bar .hint {
      color: #53a8b6;
      font-size: 12px;
      align-self: center;
    }
    .keys-bar .spacer { flex: 1; }
    .keys-bar button {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      height: 34px;
      padding: 0 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      min-width: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .keys-bar button:hover { border-color: #e94560; color: #e94560; }
    .keys-bar button:focus,
    .keys-bar button:active {
      background: #1a1a2e;
      color: #e0e0e0;
      border-color: #0f3460;
      outline: none;
      box-shadow: none;
    }
    .keys-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .keys-bar .composer-toggle {
      font-size: 24px;
      line-height: 1;
      min-width: 48px;
      padding: 0 10px;
    }
    .upload-status {
      color: #95d5b2;
      font-size: 12px;
      align-self: center;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .upload-status.error { color: #ff9aa2; }
    .recording-bar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .recording-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #e94560;
      box-shadow: 0 0 0 4px rgba(233,69,96,0.16);
    }
    .recording-time {
      color: #ffb3bd;
      font-size: 12px;
      min-width: 34px;
    }
    .recording-action.cancel {
      color: #ff9aa2;
      border-color: #7f1d2d;
    }
    .recording-action.send {
      color: #95d5b2;
      border-color: #2d6a4f;
    }
    .keys-bar .recording-action {
      height: 34px;
      padding: 0 10px;
    }
    .keys-bar .recording-action.send:hover,
    .keys-bar .recording-action.send:focus,
    .keys-bar .recording-action.send:active {
      background: #1a1a2e;
      color: #95d5b2;
      border-color: #2d6a4f;
      outline: none;
      box-shadow: none;
    }
    .keys-bar .recording-action.cancel:hover,
    .keys-bar .recording-action.cancel:focus,
    .keys-bar .recording-action.cancel:active {
      background: #1a1a2e;
      color: #ff9aa2;
      border-color: #7f1d2d;
      outline: none;
      box-shadow: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 24px;
      width: min(400px, 100%);
      max-width: 100%;
    }
    .modal h2 { margin-bottom: 16px; color: #e94560; font-size: 16px; }
    .modal input {
      width: 100%;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .modal .error {
      color: #ff9aa2;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal .actions button {
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .modal .actions .cancel { background: #6c757d; color: white; }
    .modal .actions .confirm { background: #e94560; color: white; }
    @media (max-width: 420px) {
      .modal {
        padding: 16px;
      }
      .modal .actions {
        justify-content: stretch;
      }
      .modal .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
    }
  }
</script>

<div id="app">
  <div class="top-pane">
    <div class="header">
      <h1>tclaw</h1>
      <div class="controls">
        <span class="session-name" v-if="activeSession">{{ activeSession }}</span>
        <select v-model="harness" @change="saveHarness">
          <option value="claude">claude</option>
          <option value="codex">codex</option>
        </select>
        <!-- TODO: move keyboard language settings into a dedicated config view. -->
        <span class="status" :class="statusClass">{{ statusText }}</span>
      </div>
    </div>

    <div class="sessions-bar">
      <span v-for="s in sessions" :key="s.name" style="display:inline-flex;align-items:center;gap:2px;">
        <button
          :class="{ active: s.name === activeSession }"
          @click="switchSession(s.name)"
        >{{ s.name }}</button>
        <button
          style="padding:4px 6px;color:#e94560;background:none;border:none;cursor:pointer;font-size:14px;"
          @click.stop="closeSession(s.name)"
          title="Close session"
        >&times;</button>
      </span>
      <button class="new-btn" @click="showNewModal = true">+ new</button>
    </div>
  </div>

  <div
    class="output"
    :class="{ disconnected: !connected }"
    ref="outputEl"
    tabindex="0"
    @click="focusTerminal"
  ><template v-for="(segment, index) in outputSegments" :key="index"><a v-if="segment.type === 'link'" :href="segment.text" target="_blank" rel="noreferrer">{{ segment.text }}</a><span v-else>{{ segment.text }}</span></template></div>

  <div class="bottom-pane">
    <div class="mobile-composer" v-show="showMobileComposer">
      <textarea
        ref="mobileComposerEl"
        v-model="mobileComposerText"
        rows="1"
        placeholder="Message"
        @input="resizeMobileComposer"
      ></textarea>
      <button @click="sendMobileComposer" :disabled="!mobileComposerText.trim() || !activeSession">Send</button>
    </div>

    <div class="keys-bar">
      <template v-if="isRecording">
        <span class="recording-bar">
          <span class="recording-dot"></span>
          <span class="recording-time">{{ recordingDurationText }}</span>
          <button class="recording-action cancel" @click="cancelVoiceRecording">Cancel</button>
          <button class="recording-action send" @click="finishVoiceRecording">Send</button>
        </span>
      </template>
      <template v-else>
        <button @click="toggleActionSet">⇄</button>
        <template v-if="actionSet === 'main'">
          <button @click="sendInput('/clear')" :disabled="!activeSession">Clear</button>
          <button @click="triggerImageUpload" :disabled="!activeSession || uploadInProgress">Img</button>
          <button @click="startVoiceRecording" :disabled="!activeSession || uploadInProgress">Mic</button>
          <button class="composer-toggle" @click="toggleMobileComposer" title="Keyboard">
            ⌨
          </button>
        </template>
        <template v-else>
          <span class="arrow-pad">
            <button class="arrow-up" @click="sendKey('Up')" :disabled="!activeSession">↑</button>
            <button class="arrow-left" @click="sendKey('Left')" :disabled="!activeSession">←</button>
            <button class="arrow-down" @click="sendKey('Down')" :disabled="!activeSession">↓</button>
            <button class="arrow-right" @click="sendKey('Right')" :disabled="!activeSession">→</button>
          </span>
          <button @click="sendKey('Enter')" :disabled="!activeSession">↵</button>
          <button @click="sendKey('C-c')" :disabled="!activeSession">C-c</button>
        </template>
      </template>
      <input ref="imageInputEl" type="file" accept="image/*" style="display:none" @change="handleImageSelected" />
      <span class="upload-status" :class="{ error: uploadError }">{{ uploadStatusText }}</span>
    </div>
  </div>

  <!-- New session modal -->
  <div class="modal-overlay" v-if="showNewModal" @click.self="showNewModal = false">
    <div class="modal">
      <h2>New session</h2>
      <input
        v-model="newDir"
        @keydown.enter="createSession"
        placeholder="/path/to/project"
        ref="newDirInput"
      />
      <div class="error" v-if="newSessionError">{{ newSessionError }}</div>
      <div class="actions">
        <button class="cancel" @click="showNewModal = false">Cancel</button>
        <button class="confirm" @click="createSession">Create</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createApp, computed, ref, nextTick, watch, onMounted, onBeforeUnmount } from 'vue'

  createApp({
    setup() {
      const sessions = ref([])
      const activeSession = ref(null)
      const output = ref('')
      const ready = ref(false)
      const connected = ref(false)
      const harness = ref('claude')
      const showNewModal = ref(false)
      const newDir = ref('')
      const newSessionError = ref('')
      const uploadProgress = ref(0)
      const uploadInProgress = ref(false)
      const uploadError = ref('')
      const isRecording = ref(false)
      const recordingSeconds = ref(0)
      const showMobileComposer = ref(false)
      const mobileComposerText = ref('')
      const actionSet = ref('main')
      const outputEl = ref(null)
      const mobileComposerEl = ref(null)
      const newDirInput = ref(null)
      const imageInputEl = ref(null)

      let ws = null
      let mediaRecorder = null
      let recordingStream = null
      let micStream = null
      let recordingChunks = []
      let recordingTimer = null
      const apiBase = window.location.origin

      const statusClass = ref('status-disconnected')
      const statusText = ref('disconnected')

      function updateStatus() {
        if (!connected.value) {
          statusClass.value = 'status-disconnected'
          statusText.value = 'disconnected'
        } else if (ready.value) {
          statusClass.value = 'status-ready'
          statusText.value = 'ready'
        } else {
          statusClass.value = 'status-busy'
          statusText.value = 'busy'
        }
      }

      async function fetchSessions() {
        const res = await fetch(`${apiBase}/api/sessions`)
        sessions.value = await res.json()
      }

      async function fetchConfig() {
        const res = await fetch(`${apiBase}/api/config`)
        if (!res.ok) return
        const cfg = await res.json()
        harness.value = cfg.harness || 'claude'
      }

      async function saveHarness() {
        await saveConfig()
      }

      async function saveConfig() {
        const res = await fetch(`${apiBase}/api/config`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ harness: harness.value })
        })
        if (!res.ok) return null
        const cfg = await res.json()
        harness.value = cfg.harness || 'claude'
        return cfg
      }

      function connectWS(name) {
        if (ws) {
          ws.close()
          ws = null
        }

        connected.value = false
        ready.value = false
        output.value = ''
        updateStatus()

        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
        ws = new WebSocket(`${proto}//${window.location.host}/ws/${name}`)

        ws.onopen = () => {
          connected.value = true
          updateStatus()
          nextTick(() => focusTerminal())
        }

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data)

          if (msg.type === 'snapshot' || msg.type === 'update') {
            output.value = msg.text
            if (msg.ready !== undefined) ready.value = msg.ready
          } else if (msg.type === 'status') {
            ready.value = msg.ready
          }

          updateStatus()
          nextTick(() => {
            if (outputEl.value) {
              outputEl.value.scrollTop = outputEl.value.scrollHeight
            }
          })
        }

        ws.onclose = () => {
          connected.value = false
          updateStatus()
        }
      }

      function switchSession(name) {
        activeSession.value = name
        connectWS(name)
      }

      function focusTerminal() {
        outputEl.value?.focus()
      }

      function sanitizeSessionName(dir) {
        let s = dir.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        s = s.replace(/[\/\\ ]/g, '-')
        s = s.replace(/[^a-zA-Z0-9-]/g, '')
        s = s.replace(/-{2,}/g, '-')
        s = s.replace(/^-+|-+$/g, '')
        s = s.toLowerCase()
        return s || 'session'
      }

      function normalizeKeyName(key) {
        if (key === 'ArrowUp') return 'Up'
        if (key === 'ArrowDown') return 'Down'
        if (key === 'ArrowLeft') return 'Left'
        if (key === 'ArrowRight') return 'Right'
        if (key === 'Backspace') return 'BSpace'
        if (key === 'Delete') return 'Delete'
        if (key === 'Control' || key === 'Shift' || key === 'Alt' || key === 'Meta') return ''
        if (key === 'Esc') return 'Escape'
        if (key === ' ') return 'Space'
        if (key.length === 1) return key.toLowerCase()
        return key
      }

      function toTmuxKey(event) {
        const parts = []
        if (event.ctrlKey) parts.push('C')
        if (event.altKey || event.metaKey) parts.push('M')
        if (event.shiftKey) parts.push('S')

        const key = normalizeKeyName(event.key)
        if (!key) return ''
        return parts.length ? `${parts.join('-')}-${key}` : key
      }

      function shouldHandleCombo(event) {
        const key = event.key
        return (
          key === 'Backspace' ||
          key === 'Delete' ||
          event.ctrlKey ||
          event.altKey ||
          event.metaKey ||
          key === 'Enter' ||
          key === 'Tab' ||
          key === 'Escape' ||
          key.startsWith('Arrow')
        )
      }

      function hasSelectionToCopy() {
        const selection = window.getSelection()
        return !!selection && selection.toString().length > 0
      }

      function handleGlobalKeydown(event) {
        if (!ws || !activeSession.value || !connected.value) return

        const target = event.target
        const tagName = target?.tagName

        if (target === newDirInput.value) return

        if (target?.isContentEditable || tagName === 'INPUT' || tagName === 'TEXTAREA' || tagName === 'SELECT') {
          return
        }

        const lowerKey = event.key.toLowerCase()
        if ((event.metaKey || event.ctrlKey) && lowerKey === 'c' && hasSelectionToCopy()) {
          return
        }

        if (event.key.length === 1 && !event.ctrlKey && !event.altKey && !event.metaKey) {
          event.preventDefault()
          sendText(event.key)
          return
        }

        if (!shouldHandleCombo(event)) return

        event.preventDefault()
        sendKey(toTmuxKey(event))
      }

      function sendText(text) {
        if (!text || !ws) return
        ws.send(JSON.stringify({ type: 'text', text }))
        ready.value = false
        updateStatus()
      }

      function sendCommand(text) {
        if (!text || !ws) return
        ws.send(JSON.stringify({ type: 'input', text, submit_key: 'Enter' }))
        ready.value = false
        updateStatus()
      }

      function sendInput(text, submitKey = 'Enter') {
        if (!text || !ws) return
        ws.send(JSON.stringify({ type: 'input', text, submit_key: submitKey }))
        ready.value = false
        updateStatus()
      }

      const uploadStatusText = computed(() => {
        if (uploadError.value) return uploadError.value
        if (uploadInProgress.value) return `${uploadProgress.value}%`
        return ''
      })

      const outputSegments = computed(() => linkifyOutput(output.value))

      const recordingDurationText = computed(() => {
        const minutes = Math.floor(recordingSeconds.value / 60)
        const seconds = recordingSeconds.value % 60
        return `${minutes}:${String(seconds).padStart(2, '0')}`
      })

      function linkifyOutput(text) {
        const pattern = /(https?:\/\/[^\s]+)/g
        const segments = []
        let lastIndex = 0

        for (const match of text.matchAll(pattern)) {
          const index = match.index ?? 0
          if (index > lastIndex) {
            segments.push({ type: 'text', text: text.slice(lastIndex, index) })
          }
          segments.push({ type: 'link', text: match[0] })
          lastIndex = index + match[0].length
        }

        if (lastIndex < text.length) {
          segments.push({ type: 'text', text: text.slice(lastIndex) })
        }

        if (segments.length === 0) {
          segments.push({ type: 'text', text })
        }

        return segments
      }

      function sendKey(key) {
        if (!key || !ws) return
        ws.send(JSON.stringify({ type: 'key', text: key }))
        ready.value = false
        updateStatus()
      }

      function toggleMobileComposer() {
        showMobileComposer.value = !showMobileComposer.value
        if (showMobileComposer.value) {
          nextTick(() => {
            resizeMobileComposer()
            mobileComposerEl.value?.focus()
          })
        }
      }

      function resizeMobileComposer() {
        const el = mobileComposerEl.value
        if (!el) return
        el.style.height = 'auto'
        el.style.height = `${Math.min(el.scrollHeight, 126)}px`
        el.style.overflowY = el.scrollHeight > 126 ? 'auto' : 'hidden'
      }

      function toggleActionSet() {
        actionSet.value = actionSet.value === 'main' ? 'nav' : 'main'
      }

      function sendMobileComposer() {
        const text = mobileComposerText.value.trim()
        if (!text || !activeSession.value) return
        sendInput(text)
        mobileComposerText.value = ''
        nextTick(() => {
          resizeMobileComposer()
          mobileComposerEl.value?.focus()
        })
      }

      async function closeSession(name) {
        if (!confirm(`Close session "${name}"?`)) return
        await fetch(`${apiBase}/api/sessions/${name}`, { method: 'DELETE' })
        if (activeSession.value === name) {
          if (ws) { ws.close(); ws = null }
          activeSession.value = null
          output.value = ''
          connected.value = false
          updateStatus()
        }
        await fetchSessions()
        if (!activeSession.value && sessions.value.length > 0) {
          switchSession(sessions.value[0].name)
        }
      }

      async function createSession() {
        const dir = newDir.value.trim()
        if (!dir) return
        newSessionError.value = ''

        const res = await fetch(`${apiBase}/api/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir })
        })

        if (res.ok) {
          const s = await res.json()
          await fetchSessions()
          switchSession(s.name)
          showNewModal.value = false
          newDir.value = ''
          newSessionError.value = ''
          return
        }

        const errorText = (await res.text()).trim() || 'Could not create session'
        await fetchSessions()

        if (res.status === 409) {
          const existingName = sanitizeSessionName(dir)
          const existing = sessions.value.find((s) => s.name === existingName)
          if (existing) {
            switchSession(existing.name)
            showNewModal.value = false
            newDir.value = ''
            newSessionError.value = ''
            return
          }
        }

        newSessionError.value = errorText
      }

      watch(showNewModal, (v) => {
        if (v) {
          newSessionError.value = ''
          nextTick(() => newDirInput.value?.focus())
        }
      })

      function triggerImageUpload() {
        uploadError.value = ''
        imageInputEl.value?.click()
      }

      function handleImageSelected(event) {
        const file = event.target.files?.[0]
        if (!file) return
        uploadFile(file)
        event.target.value = ''
      }

      function uploadFile(file) {
        uploadError.value = ''
        uploadInProgress.value = true
        uploadProgress.value = 0

        const form = new FormData()
        form.append('file', file)

        const xhr = new XMLHttpRequest()
        xhr.open('POST', `${apiBase}/api/sessions/${encodeURIComponent(activeSession.value)}/uploads`)

        xhr.upload.onprogress = (event) => {
          if (!event.lengthComputable) return
          uploadProgress.value = Math.round((event.loaded / event.total) * 100)
        }

        xhr.onload = () => {
          uploadInProgress.value = false

          if (xhr.status < 200 || xhr.status >= 300) {
            uploadError.value = xhr.responseText?.trim() || 'Upload failed'
            return
          }

          try {
            const data = JSON.parse(xhr.responseText)
            uploadProgress.value = 100
            if (data.transcript) {
              sendInput(`<transcript>${data.transcript}</transcript>`)
            } else {
              sendText(`@${data.full_path} `)
            }
            if (data.transcription_error && !data.transcript) {
              uploadError.value = data.transcription_error
            }
            nextTick(() => focusTerminal())
            setTimeout(() => {
              if (!uploadInProgress.value) {
                uploadProgress.value = 0
                if (!data.transcription_error || data.transcript) {
                  uploadError.value = ''
                }
              }
            }, 800)
          } catch {
            uploadError.value = 'Invalid upload response'
          }
        }

        xhr.onerror = () => {
          uploadInProgress.value = false
          uploadError.value = 'Upload failed'
        }

        xhr.send(form)
      }

      function startRecordingTimer() {
        stopRecordingTimer()
        recordingTimer = window.setInterval(() => {
          recordingSeconds.value += 1
        }, 1000)
      }

      function stopRecordingTimer() {
        if (recordingTimer) {
          window.clearInterval(recordingTimer)
          recordingTimer = null
        }
      }

      function stopRecordingStream() {
        if (recordingStream && recordingStream !== micStream) {
          for (const track of recordingStream.getTracks()) {
            track.stop()
          }
        }
        recordingStream = null
      }

      function stopMicStream() {
        if (micStream) {
          for (const track of micStream.getTracks()) {
            track.stop()
          }
          micStream = null
        }
        recordingStream = null
      }

      function cleanupRecorder() {
        stopRecordingTimer()
        stopRecordingStream()
        mediaRecorder = null
        recordingChunks = []
        recordingSeconds.value = 0
      }

      async function getMicStream() {
        if (micStream && micStream.getAudioTracks().some((track) => track.readyState === 'live')) {
          return micStream
        }
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        return micStream
      }

      function microphoneErrorMessage(err) {
        if (!window.isSecureContext) {
          return 'Mic requires HTTPS or localhost'
        }
        if (!navigator.mediaDevices?.getUserMedia) {
          return 'Microphone is not supported here'
        }
        if (!window.MediaRecorder) {
          return 'Audio recording is not supported here'
        }
        if (err?.name === 'NotAllowedError' || err?.name === 'SecurityError') {
          return 'Microphone permission denied'
        }
        if (err?.name === 'NotFoundError' || err?.name === 'DevicesNotFoundError') {
          return 'No microphone found'
        }
        if (err?.name === 'NotReadableError' || err?.name === 'TrackStartError') {
          return 'Microphone is busy'
        }
        return err?.message || 'Could not start microphone'
      }

      async function startVoiceRecording() {
        if (isRecording.value || uploadInProgress.value) return

        uploadError.value = ''
        isRecording.value = false

        if (!window.isSecureContext || !navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
          uploadError.value = microphoneErrorMessage()
          cleanupRecorder()
          return
        }

        try {
          recordingStream = await getMicStream()
          const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm'

          mediaRecorder = new MediaRecorder(recordingStream, mimeType ? { mimeType } : undefined)
          recordingChunks = []
          recordingSeconds.value = 0

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              recordingChunks.push(event.data)
            }
          }

          mediaRecorder.onerror = () => {
            uploadError.value = 'Recording failed'
            isRecording.value = false
            cleanupRecorder()
          }

          mediaRecorder.start()
          isRecording.value = true
          startRecordingTimer()
        } catch (err) {
          isRecording.value = false
          uploadError.value = microphoneErrorMessage(err)
          cleanupRecorder()
        }
      }

      function cancelVoiceRecording() {
        if (!mediaRecorder) {
          isRecording.value = false
          cleanupRecorder()
          return
        }
        const recorder = mediaRecorder
        recorder.onstop = null
        if (recorder.state !== 'inactive') {
          recorder.stop()
        }
        isRecording.value = false
        cleanupRecorder()
      }

      function finishVoiceRecording() {
        if (!mediaRecorder) {
          isRecording.value = false
          cleanupRecorder()
          return
        }

        const recorder = mediaRecorder
        recorder.onstop = () => {
          const blob = new Blob(recordingChunks, { type: recorder.mimeType || 'audio/webm' })
          const extension = blob.type.includes('ogg') ? 'ogg' : 'webm'
          const file = new File([blob], `voice-note.${extension}`, { type: blob.type || 'audio/webm' })

          isRecording.value = false
          cleanupRecorder()
          uploadFile(file)
        }

        if (recorder.state !== 'inactive') {
          recorder.stop()
        }
      }

      onMounted(() => {
        window.addEventListener('keydown', handleGlobalKeydown, true)
        fetchConfig()
        fetchSessions().then(() => {
          if (sessions.value.length > 0) {
            switchSession(sessions.value[0].name)
          }
        })
        nextTick(() => focusTerminal())
      })

      onBeforeUnmount(() => {
        window.removeEventListener('keydown', handleGlobalKeydown, true)
        cancelVoiceRecording()
        stopMicStream()
      })

      return {
        sessions, activeSession, output, outputSegments, ready, connected, harness,
        showNewModal, newDir, newSessionError, uploadProgress, uploadInProgress, uploadError, uploadStatusText, isRecording, recordingDurationText, showMobileComposer, mobileComposerText, actionSet, outputEl, mobileComposerEl, newDirInput, imageInputEl,
        statusClass, statusText,
        switchSession, sendKey, sendText, sendCommand, sendInput, closeSession, createSession, focusTerminal, triggerImageUpload, handleImageSelected, startVoiceRecording, cancelVoiceRecording, finishVoiceRecording, saveHarness, toggleMobileComposer, resizeMobileComposer, toggleActionSet, sendMobileComposer
      }
    }
  }).mount('#app')
</script>
