<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>tclaw</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html,
    body {
      height: 100%;
      overflow: hidden;
    }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
    }

    .top-pane,
    .bottom-pane {
      flex: 0 0 auto;
    }

    .header {
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 16px; color: #e94560; }
    .header .session-name { color: #53a8b6; font-size: 13px; }
    .header .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header select {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
    }
    .header .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .status-ready { background: #2d6a4f; color: #95d5b2; }
    .status-busy { background: #7f4f24; color: #ddb892; }
    .status-disconnected { background: #6c757d; color: #dee2e6; }

    .sessions-bar {
      padding: 6px 16px;
      background: #0f3460;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .sessions-bar .dir {
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    /* default state = stopped: just a folder, no live PTY session */
    .sessions-bar button {
      background: #16213e;
      color: #8a93a8;
      border: 1px solid #1a1a2e;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .sessions-bar button:hover { background: #1a1a2e; }
    /* running = live PTY session for this folder */
    .sessions-bar button.running { border-color: #2d6a4f; color: #95d5b2; }
    /* active = the session currently shown (wins over running) */
    .sessions-bar button.active { border-color: #e94560; color: #e94560; }
    .sessions-bar .stop-btn {
      padding: 4px 6px;
      color: #ddb892;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .sessions-bar .new-btn { color: #95d5b2; border-color: #2d6a4f; }

    .terminal-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      padding: 4px 6px;
      background: #1a1a2e;
    }
    .terminal-wrap.disconnected { opacity: 0.55; }
    .terminal-host { width: 100%; height: 100%; }
    .terminal-host .xterm { height: 100%; }
    .terminal-host .xterm-viewport { overflow-y: auto; }

    .mobile-composer {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #10192f;
      border-top: 1px solid #0f3460;
      align-items: flex-end;
    }
    .mobile-composer textarea {
      flex: 1;
      min-height: 38px;
      max-height: 126px;
      overflow-y: hidden;
      resize: none;
      border: 1px solid #0f3460;
      border-radius: 18px;
      background: #f8fafc;
      color: #152238;
      padding: 9px 12px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.3;
      outline: none;
    }
    .mobile-composer button {
      height: 38px;
      min-width: 52px;
      border: none;
      border-radius: 18px;
      background: #2d6a4f;
      color: #ffffff;
      padding: 0 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    @media (hover: none), (pointer: coarse) {
      .keys-bar button {
        min-width: 0;
        padding: 0 8px;
        font-size: 11px;
        flex: 0 0 auto;
      }
    }
    .keys-bar {
      display: flex;
      padding: 4px 16px;
      background: #16213e;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .arrow-pad {
      display: grid;
      grid-template-columns: repeat(3, 36px);
      grid-template-areas:
        ". up ."
        "left down right";
      gap: 4px;
      align-items: center;
    }
    .arrow-pad button {
      padding: 0;
    }
    .arrow-up { grid-area: up; }
    .arrow-left { grid-area: left; }
    .arrow-down { grid-area: down; }
    .arrow-right { grid-area: right; }
    .keys-bar .hint {
      color: #53a8b6;
      font-size: 12px;
      align-self: center;
    }
    .keys-bar .spacer { flex: 1; }
    .keys-bar button {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      height: 34px;
      padding: 0 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      min-width: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .keys-bar button:hover { border-color: #e94560; color: #e94560; }
    .keys-bar button:focus,
    .keys-bar button:active {
      background: #1a1a2e;
      color: #e0e0e0;
      border-color: #0f3460;
      outline: none;
      box-shadow: none;
    }
    .keys-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .keys-bar button.active {
      border-color: #e94560;
      color: #e94560;
    }
    .keys-bar .composer-toggle {
      font-size: 24px;
      line-height: 1;
      min-width: 48px;
      padding: 0 10px;
    }
    .upload-status {
      color: #95d5b2;
      font-size: 12px;
      align-self: center;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .upload-status.error { color: #ff9aa2; }
    .recording-bar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .recording-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #e94560;
      box-shadow: 0 0 0 4px rgba(233,69,96,0.16);
    }
    .recording-time {
      color: #ffb3bd;
      font-size: 12px;
      min-width: 34px;
    }
    .recording-action.cancel {
      color: #ff9aa2;
      border-color: #7f1d2d;
    }
    .recording-action.send {
      color: #95d5b2;
      border-color: #2d6a4f;
    }
    .keys-bar .recording-action {
      height: 34px;
      padding: 0 10px;
    }
    .keys-bar .recording-action.send:hover,
    .keys-bar .recording-action.send:focus,
    .keys-bar .recording-action.send:active {
      background: #1a1a2e;
      color: #95d5b2;
      border-color: #2d6a4f;
      outline: none;
      box-shadow: none;
    }
    .keys-bar .recording-action.cancel:hover,
    .keys-bar .recording-action.cancel:focus,
    .keys-bar .recording-action.cancel:active {
      background: #1a1a2e;
      color: #ff9aa2;
      border-color: #7f1d2d;
      outline: none;
      box-shadow: none;
    }

    .textview-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
    }
    .textview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex: 0 0 auto;
    }
    .textview-header h2 { font-size: 13px; color: #53a8b6; font-weight: normal; }
    .textview-header button {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .textview-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px;
      margin: 0;
      white-space: pre;
      font-family: inherit;
      font-size: 12px;
      line-height: 1.4;
      color: #e0e0e0;
      /* Re-enable native iOS text selection + the "Copy" callout,
         which the global reset disables. */
      user-select: text;
      -webkit-user-select: text;
      -webkit-touch-callout: default;
    }
    .textview-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      flex: 0 0 auto;
    }
    .textview-footer button {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 9px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .textview-footer button:active { border-color: #e94560; color: #e94560; }
    .textview-footer .textview-status {
      margin-left: auto;
      color: #95d5b2;
      font-size: 12px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 24px;
      width: min(400px, 100%);
      max-width: 100%;
    }
    .modal h2 { margin-bottom: 16px; color: #e94560; font-size: 16px; }
    .modal input {
      width: 100%;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .modal .error {
      color: #ff9aa2;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal .actions button {
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .modal .actions .cancel { background: #6c757d; color: white; }
    .modal .actions .confirm { background: #e94560; color: white; }
    @media (max-width: 420px) {
      .modal {
        padding: 16px;
      }
      .modal .actions {
        justify-content: stretch;
      }
      .modal .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
    }
  }
</script>

<div id="app">
  <div class="top-pane">
    <div class="header">
      <h1>tclaw</h1>
      <div class="controls">
        <span class="session-name" v-if="activeSession">{{ activeSession }}</span>
        <select v-model="harness" @change="saveHarness">
          <option value="claude">claude</option>
          <option value="codex">codex</option>
        </select>
        <span class="status" :class="statusClass">{{ statusText }}</span>
      </div>
    </div>

    <div class="sessions-bar">
      <span v-for="d in dirs" :key="d.name" class="dir">
        <button
          :class="{ active: d.session === activeSession, running: d.running }"
          @click="openDir(d)"
        >{{ d.name }}</button>
        <button
          v-if="d.running"
          class="stop-btn"
          @click.stop="stopSession(d.session)"
          title="Detener sesión"
        >&#9209;</button>
      </span>
      <button class="new-btn" @click="showNewModal = true">+ new</button>
    </div>
  </div>

  <div class="terminal-wrap" :class="{ disconnected: !connected }">
    <div ref="terminalEl" class="terminal-host"></div>
  </div>

  <div class="bottom-pane">
    <div class="mobile-composer" v-show="showMobileComposer">
      <textarea
        ref="mobileComposerEl"
        v-model="mobileComposerText"
        rows="1"
        placeholder="Message"
        @input="resizeMobileComposer"
        @keydown.enter.exact.prevent="sendMobileComposer"
      ></textarea>
      <button @click="sendMobileComposer" :disabled="!activeSession">Send</button>
    </div>

    <div class="keys-bar">
      <template v-if="isRecording">
        <span class="recording-bar">
          <span class="recording-dot"></span>
          <span class="recording-time">{{ recordingDurationText }}</span>
          <button class="recording-action cancel" @click="cancelVoiceRecording">Cancel</button>
          <button class="recording-action send" @click="finishVoiceRecording">Send</button>
        </span>
      </template>
      <template v-else>
        <button @click="toggleActionSet">⇄</button>
        <button
          class="composer-toggle"
          :class="{ active: showMobileComposer }"
          @click="toggleComposer"
          title="Mostrar/ocultar campo de texto"
        >⌨</button>
        <template v-if="actionSet === 'main'">
          <button @click="copyTerminal" :disabled="!activeSession">{{ copied ? '✓' : 'Copy' }}</button>
          <button @click="openTextView" :disabled="!activeSession">📄</button>
          <button @click="sendInput('/clear')" :disabled="!activeSession">Clear</button>
          <button @click="triggerImageUpload" :disabled="!activeSession || uploadInProgress">Img</button>
          <button @click="startVoiceRecording" :disabled="!activeSession || uploadInProgress">Mic</button>
        </template>
        <template v-else>
          <span class="arrow-pad">
            <button class="arrow-up" @click="sendKey('Up')" :disabled="!activeSession">↑</button>
            <button class="arrow-left" @click="sendKey('Left')" :disabled="!activeSession">←</button>
            <button class="arrow-down" @click="sendKey('Down')" :disabled="!activeSession">↓</button>
            <button class="arrow-right" @click="sendKey('Right')" :disabled="!activeSession">→</button>
          </span>
          <button @click="sendKey('Enter')" :disabled="!activeSession">↵</button>
          <button @click="sendKey('Tab')" :disabled="!activeSession">Tab</button>
          <button @click="sendKey('Escape')" :disabled="!activeSession">Esc</button>
          <button @click="sendKey('BSpace')" :disabled="!activeSession">⌫</button>
          <button @click="sendKey('Delete')" :disabled="!activeSession">Del</button>
          <button @click="sendKey('C-c')" :disabled="!activeSession">Ctrl+C</button>
          <button @click="sendKey('C-b')" :disabled="!activeSession">Ctrl+B</button>
          <button @click="sendKey('C-d')" :disabled="!activeSession">Ctrl+D</button>
          <button @click="sendKey('C-l')" :disabled="!activeSession">Ctrl+L</button>
          <button @click="sendKey('C-u')" :disabled="!activeSession">Ctrl+U</button>
          <button @click="sendKey('C-w')" :disabled="!activeSession">Ctrl+W</button>
        </template>
        <button @click="insertComposerNewline" :disabled="!activeSession">NL</button>
      </template>
      <input ref="imageInputEl" type="file" accept="image/*" style="display:none" @change="handleImageSelected" />
      <span class="upload-status" :class="{ error: uploadError }">{{ uploadStatusText }}</span>
    </div>
  </div>

  <!-- Text view: plain-text overlay for native selection / copy -->
  <div class="textview-overlay" v-if="showTextView">
    <div class="textview-header">
      <h2>Mantén pulsado para seleccionar y copiar</h2>
      <button @click="closeTextView">Cerrar ✕</button>
    </div>
    <pre class="textview-body">{{ textViewContent }}</pre>
    <div class="textview-footer">
      <button @click="copyTextViewSelection">Copiar selección</button>
      <button @click="copyTextViewAll">Copiar todo</button>
      <span class="textview-status">{{ textViewStatus }}</span>
    </div>
  </div>

  <!-- New session modal -->
  <div class="modal-overlay" v-if="showNewModal" @click.self="showNewModal = false">
    <div class="modal">
      <h2>New session</h2>
      <input
        v-model="newDir"
        @keydown.enter="createFromModal"
        placeholder="/path/to/project"
        ref="newDirInput"
      />
      <div class="error" v-if="newSessionError">{{ newSessionError }}</div>
      <div class="actions">
        <button class="cancel" @click="showNewModal = false">Cancel</button>
        <button class="confirm" @click="createFromModal">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" v-if="showAuthModal" @click.self="authTokenInput = authTokenInput.trim()">
    <div class="modal">
      <h2>Token</h2>
      <input
        v-model="authTokenInput"
        @keydown.enter="saveAuthToken"
        placeholder="AUTH_TOKEN"
      />
      <div class="error" v-if="authError">{{ authError }}</div>
      <div class="actions">
        <button class="confirm" @click="saveAuthToken">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>

<script type="module">
  import { createApp, computed, ref, nextTick, watch, onMounted, onBeforeUnmount } from 'vue'

  // Raw escape sequences for the named keys exposed in the nav bar.
  const KEY_SEQ = {
    Up: '\x1b[A', Down: '\x1b[B', Right: '\x1b[C', Left: '\x1b[D',
    Enter: '\r', Tab: '\t', Escape: '\x1b', BSpace: '\x7f', Delete: '\x1b[3~',
    'C-c': '\x03', 'C-b': '\x02', 'C-d': '\x04',
    'C-l': '\x0c', 'C-u': '\x15', 'C-w': '\x17',
  }

  createApp({
    setup() {
      const dirs = ref([])             // [{ name, session, running }]
      const activeSession = ref(null)  // sanitized session name currently shown
      const defaultSession = ref('agent')
      const connected = ref(false)
      const harness = ref('claude')
      const showNewModal = ref(false)
      const showAuthModal = ref(false)
      const newDir = ref('')
      const newSessionError = ref('')
      const authError = ref('')
      const authTokenInput = ref(localStorage.getItem('tclaw_auth_token') || '')
      const uploadProgress = ref(0)
      const uploadInProgress = ref(false)
      const uploadError = ref('')
      const copied = ref(false)
      const showTextView = ref(false)
      const textViewContent = ref('')
      const textViewStatus = ref('')
      const isRecording = ref(false)
      const recordingSeconds = ref(0)
      const showMobileComposer = ref(localStorage.getItem('tclaw_show_composer') === '1')
      const mobileComposerText = ref('')
      const actionSetStorageKey = 'tclaw_action_set'
      const actionSet = ref(localStorage.getItem(actionSetStorageKey) || 'main')
      const terminalEl = ref(null)
      const mobileComposerEl = ref(null)
      const newDirInput = ref(null)
      const imageInputEl = ref(null)

      let ws = null
      let reconnectTimer = null
      let reconnectAttempts = 0
      let mediaRecorder = null
      let recordingStream = null
      let micStream = null
      let recordingChunks = []
      let recordingTimer = null
      let term = null
      let fitAddon = null
      let resizeObserver = null
      const apiBase = window.location.origin
      const authStorageKey = 'tclaw_auth_token'

      const statusClass = ref('status-disconnected')
      const statusText = ref('disconnected')

      function updateStatus() {
        if (connected.value) {
          statusClass.value = 'status-ready'
          statusText.value = 'connected'
        } else {
          statusClass.value = 'status-disconnected'
          statusText.value = 'disconnected'
        }
      }

      // --- terminal ----------------------------------------------------------

      function fitTerminal() {
        if (!fitAddon || !term) return
        try {
          fitAddon.fit()
        } catch {
          // container not measurable yet — ignore
        }
      }

      function setupTerminal() {
        const coarse = window.matchMedia('(pointer: coarse)').matches
        term = new Terminal({
          cursorBlink: true,
          fontSize: coarse ? 11 : 14,
          fontFamily: 'SF Mono, Fira Code, Menlo, Consolas, monospace',
          scrollback: 5000,
          smoothScrollDuration: 120,
          theme: {
            background: '#1a1a2e',
            foreground: '#e0e0e0',
            cursor: '#e94560',
            selectionBackground: '#0f3460',
          },
        })
        fitAddon = new FitAddon.FitAddon()
        term.loadAddon(fitAddon)
        term.loadAddon(new WebLinksAddon.WebLinksAddon())
        term.open(terminalEl.value)

        term.onData((data) => sendRaw(data))
        term.onResize(() => sendResize())

        fitTerminal()

        resizeObserver = new ResizeObserver(() => fitTerminal())
        resizeObserver.observe(terminalEl.value)
      }

      // --- websocket / input -------------------------------------------------

      function sendRaw(data) {
        if (!ws || ws.readyState !== WebSocket.OPEN || !data) return
        ws.send(new TextEncoder().encode(data))
      }

      // sendInput pastes text via bracketed paste so embedded newlines stay
      // literal, then optionally submits with Enter.
      function sendInput(text, submit = true) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return
        sendRaw('\x1b[200~' + text + '\x1b[201~')
        if (submit) {
          setTimeout(() => sendRaw('\r'), 120)
        }
      }

      function sendText(text) {
        sendRaw(text)
      }

      function sendKey(name) {
        sendRaw(KEY_SEQ[name] || name)
      }

      // copyTerminal copies the current selection to the clipboard. With no
      // selection it copies the visible screen — handy on mobile, where
      // precise selection is awkward.
      async function copyTerminal() {
        if (!term) return
        let text = term.getSelection()
        if (!text) {
          const buf = term.buffer.active
          const lines = []
          for (let i = 0; i < term.rows; i++) {
            const line = buf.getLine(buf.viewportY + i)
            if (line) lines.push(line.translateToString(true))
          }
          text = lines.join('\n').replace(/\s+$/, '')
        }
        if (!text) return
        try {
          await navigator.clipboard.writeText(text)
          copied.value = true
          setTimeout(() => { copied.value = false }, 1200)
        } catch {
          uploadError.value = 'No se pudo copiar'
        }
      }

      // openTextView snapshots the terminal buffer (screen + scrollback) into
      // a plain-text overlay where native iOS selection / copy works.
      function openTextView() {
        if (!term) return
        const buf = term.buffer.active
        const lines = []
        for (let i = 0; i < buf.length; i++) {
          const line = buf.getLine(i)
          lines.push(line ? line.translateToString(true) : '')
        }
        textViewContent.value = lines.join('\n').replace(/\s+$/, '')
        showTextView.value = true
      }

      function closeTextView() {
        showTextView.value = false
        textViewStatus.value = ''
      }

      function flashTextViewStatus(msg) {
        textViewStatus.value = msg
        setTimeout(() => {
          if (textViewStatus.value === msg) textViewStatus.value = ''
        }, 1600)
      }

      async function copyTextViewSelection() {
        const sel = (window.getSelection && window.getSelection().toString()) || ''
        if (!sel) {
          flashTextViewStatus('Nada seleccionado')
          return
        }
        try {
          await navigator.clipboard.writeText(sel)
          flashTextViewStatus('Selección copiada ✓')
        } catch {
          flashTextViewStatus('No se pudo copiar')
        }
      }

      async function copyTextViewAll() {
        if (!textViewContent.value) return
        try {
          await navigator.clipboard.writeText(textViewContent.value)
          flashTextViewStatus('Todo copiado ✓')
        } catch {
          flashTextViewStatus('No se pudo copiar')
        }
      }

      function sendResize() {
        if (!ws || ws.readyState !== WebSocket.OPEN || !term) return
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }))
      }

      function currentAuthToken() {
        return authTokenInput.value.trim()
      }

      function authHeaders(extra = {}) {
        const token = currentAuthToken()
        if (!token) return extra
        return { ...extra, Authorization: `Bearer ${token}` }
      }

      function setUnauthorized() {
        authError.value = currentAuthToken() ? 'Invalid token' : ''
        showAuthModal.value = true
      }

      async function apiFetch(path, options = {}) {
        const opts = { ...options }
        opts.headers = authHeaders(options.headers || {})
        const res = await fetch(`${apiBase}${path}`, opts)
        if (res.status === 401) {
          setUnauthorized()
        }
        return res
      }

      async function saveAuthToken() {
        localStorage.setItem(authStorageKey, currentAuthToken())
        authError.value = ''
        showAuthModal.value = false
        await fetchConfig()
        await fetchDirs()
        await routeFromURL()
      }

      async function fetchConfig() {
        const res = await apiFetch('/api/config')
        if (!res.ok) return
        const cfg = await res.json()
        harness.value = cfg.harness || 'claude'
        defaultSession.value = cfg.default_session || 'agent'
      }

      async function fetchDirs() {
        const res = await apiFetch('/api/dirs')
        if (!res.ok) return
        dirs.value = await res.json()
      }

      async function saveHarness() {
        await saveConfig()
      }

      async function saveConfig() {
        const res = await apiFetch('/api/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ harness: harness.value })
        })
        if (!res.ok) return null
        const cfg = await res.json()
        harness.value = cfg.harness || 'claude'
        return cfg
      }

      function cancelReconnect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer)
          reconnectTimer = null
        }
        reconnectAttempts = 0
      }

      function connectWS(name) {
        cancelReconnect()
        if (ws) {
          ws.close()
          ws = null
        }

        connected.value = false
        updateStatus()

        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
        const token = currentAuthToken()
        const url = new URL(`${proto}//${window.location.host}/ws/${encodeURIComponent(name)}`)
        if (token) {
          url.searchParams.set('token', token)
        }
        const newWs = new WebSocket(url.toString())
        newWs.binaryType = 'arraybuffer'
        ws = newWs
        let opened = false

        newWs.onopen = () => {
          if (ws !== newWs) return
          opened = true
          connected.value = true
          reconnectAttempts = 0
          updateStatus()
          fitTerminal()
          sendResize()
          fetchDirs()
        }

        newWs.onmessage = (e) => {
          if (ws !== newWs || !term) return
          if (e.data instanceof ArrayBuffer) {
            term.write(new Uint8Array(e.data))
          } else {
            term.write(e.data)
          }
        }

        newWs.onclose = () => {
          if (ws !== newWs) return
          connected.value = false
          updateStatus()
          if (opened) {
            scheduleReconnect(name)
          } else {
            // Never connected — the session may have ended. Only retry if a
            // live session for it still exists.
            fetchDirs().then(() => {
              const d = dirs.value.find((x) => x.session === name)
              if (d && d.running) scheduleReconnect(name)
            })
          }
        }

        newWs.onerror = () => newWs.close()
      }

      function scheduleReconnect(name) {
        if (reconnectTimer) return
        if (activeSession.value !== name) return
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000)
        reconnectAttempts++
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null
          if (activeSession.value === name) {
            connectWS(name)
          }
        }, delay)
      }

      // --- session / directory routing --------------------------------------

      function sanitizeSessionName(dir) {
        let s = dir.normalize('NFD').replace(/[̀-ͯ]/g, '')
        s = s.replace(/[\/\\ ]/g, '-')
        s = s.replace(/[^a-zA-Z0-9-]/g, '')
        s = s.replace(/-{2,}/g, '-')
        s = s.replace(/^-+|-+$/g, '')
        s = s.toLowerCase()
        return s || 'session'
      }

      // selectSession points the UI + URL at a session and connects to it.
      function selectSession(name) {
        activeSession.value = name
        const path = '/' + encodeURIComponent(name)
        if (window.location.pathname !== path) {
          history.pushState({}, '', path)
        }
        if (term) term.reset()
        connectWS(name)
      }

      // createSessionWithDir creates (or reuses) a session for a directory.
      async function createSessionWithDir(dir) {
        const res = await apiFetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir })
        })
        if (res.ok) {
          const s = await res.json()
          await fetchDirs()
          selectSession(s.name)
          return true
        }
        if (res.status === 409) {
          await fetchDirs()
          selectSession(sanitizeSessionName(dir))
          return true
        }
        return false
      }

      // openDir handles a tap on a directory in the bar.
      async function openDir(d) {
        if (d.running) {
          selectSession(d.session)
        } else {
          await createSessionWithDir(d.name)
        }
      }

      async function openSessionByName(name) {
        const d = dirs.value.find((x) => x.session === name)
        if (d) {
          await openDir(d)
          return
        }
        if (name === defaultSession.value) {
          // Default has no folder yet — create it.
          await createSessionWithDir(defaultSession.value)
          return
        }
        // Unknown path → fall back to the default session.
        await openSessionByName(defaultSession.value)
      }

      // routeFromURL resolves the current URL path to a session.
      async function routeFromURL() {
        const seg = decodeURIComponent(
          (window.location.pathname || '/').replace(/^\/+/, '').split('/')[0] || ''
        )
        await openSessionByName(seg || defaultSession.value)
      }

      // stopSession kills the PTY session inside tclaw. The folder stays;
      // it just has no live session anymore.
      async function stopSession(name) {
        await apiFetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' })
        if (activeSession.value === name) {
          cancelReconnect()
          if (ws) { ws.close(); ws = null }
          connected.value = false
          updateStatus()
          if (term) term.reset()
        }
        await fetchDirs()
      }

      async function createFromModal() {
        const dir = newDir.value.trim()
        if (!dir) return
        newSessionError.value = ''
        const ok = await createSessionWithDir(dir)
        if (ok) {
          showNewModal.value = false
          newDir.value = ''
        } else {
          newSessionError.value = 'Could not create session'
          await fetchDirs()
        }
      }

      watch(showNewModal, (v) => {
        if (v) {
          newSessionError.value = ''
          nextTick(() => newDirInput.value?.focus())
        }
      })

      // --- composer / keys ---------------------------------------------------

      const uploadStatusText = computed(() => {
        if (uploadError.value) return uploadError.value
        if (uploadInProgress.value) return `${uploadProgress.value}%`
        return ''
      })

      const recordingDurationText = computed(() => {
        const minutes = Math.floor(recordingSeconds.value / 60)
        const seconds = recordingSeconds.value % 60
        return `${minutes}:${String(seconds).padStart(2, '0')}`
      })

      function resizeMobileComposer() {
        const el = mobileComposerEl.value
        if (!el) return
        el.style.height = 'auto'
        el.style.height = `${Math.min(el.scrollHeight, 126)}px`
        el.style.overflowY = el.scrollHeight > 126 ? 'auto' : 'hidden'
      }

      function toggleActionSet() {
        actionSet.value = actionSet.value === 'main' ? 'nav' : 'main'
        localStorage.setItem(actionSetStorageKey, actionSet.value)
      }

      function toggleComposer() {
        showMobileComposer.value = !showMobileComposer.value
        localStorage.setItem('tclaw_show_composer', showMobileComposer.value ? '1' : '0')
        if (showMobileComposer.value) {
          nextTick(() => {
            resizeMobileComposer()
            mobileComposerEl.value?.focus()
          })
        }
      }

      function sendMobileComposer() {
        if (!activeSession.value) return
        const text = mobileComposerText.value.trim()
        if (!text) {
          sendKey('Enter')
          nextTick(() => mobileComposerEl.value?.focus())
          return
        }
        sendInput(text)
        mobileComposerText.value = ''
        nextTick(() => {
          resizeMobileComposer()
          mobileComposerEl.value?.focus()
        })
      }

      function insertComposerNewline() {
        if (!activeSession.value) return
        sendInput('\n', false)
        nextTick(() => mobileComposerEl.value?.focus())
      }

      function focusComposer() {
        mobileComposerEl.value?.focus()
      }

      // --- uploads -----------------------------------------------------------

      function triggerImageUpload() {
        uploadError.value = ''
        imageInputEl.value?.click()
      }

      function handleImageSelected(event) {
        const file = event.target.files?.[0]
        if (!file) return
        uploadFile(file)
        event.target.value = ''
      }

      function uploadFile(file) {
        uploadError.value = ''
        uploadInProgress.value = true
        uploadProgress.value = 0

        const form = new FormData()
        form.append('file', file)

        const xhr = new XMLHttpRequest()
        xhr.open('POST', `${apiBase}/api/sessions/${encodeURIComponent(activeSession.value)}/uploads`)
        const token = currentAuthToken()
        if (token) {
          xhr.setRequestHeader('Authorization', `Bearer ${token}`)
        }

        xhr.upload.onprogress = (event) => {
          if (!event.lengthComputable) return
          uploadProgress.value = Math.round((event.loaded / event.total) * 100)
        }

        xhr.onload = () => {
          uploadInProgress.value = false

          if (xhr.status === 401) {
            setUnauthorized()
            return
          }

          if (xhr.status < 200 || xhr.status >= 300) {
            uploadError.value = xhr.responseText?.trim() || 'Upload failed'
            return
          }

          try {
            const data = JSON.parse(xhr.responseText)
            uploadProgress.value = 100
            if (data.transcript) {
              sendInput(`<transcript>${data.transcript}</transcript>`)
            } else {
              sendText(`@${data.full_path} `)
            }
            if (data.transcription_error && !data.transcript) {
              uploadError.value = data.transcription_error
            }
            nextTick(() => focusComposer())
            setTimeout(() => {
              if (!uploadInProgress.value) {
                uploadProgress.value = 0
                if (!data.transcription_error || data.transcript) {
                  uploadError.value = ''
                }
              }
            }, 800)
          } catch {
            uploadError.value = 'Invalid upload response'
          }
        }

        xhr.onerror = () => {
          uploadInProgress.value = false
          uploadError.value = 'Upload failed'
        }

        xhr.send(form)
      }

      // --- voice recording ---------------------------------------------------

      function startRecordingTimer() {
        stopRecordingTimer()
        recordingTimer = window.setInterval(() => {
          recordingSeconds.value += 1
        }, 1000)
      }

      function stopRecordingTimer() {
        if (recordingTimer) {
          window.clearInterval(recordingTimer)
          recordingTimer = null
        }
      }

      function stopRecordingStream() {
        if (recordingStream && recordingStream !== micStream) {
          for (const track of recordingStream.getTracks()) {
            track.stop()
          }
        }
        recordingStream = null
      }

      function stopMicStream() {
        if (micStream) {
          for (const track of micStream.getTracks()) {
            track.stop()
          }
          micStream = null
        }
        recordingStream = null
      }

      function cleanupRecorder() {
        stopRecordingTimer()
        stopRecordingStream()
        mediaRecorder = null
        recordingChunks = []
        recordingSeconds.value = 0
      }

      async function getMicStream() {
        if (micStream && micStream.getAudioTracks().some((track) => track.readyState === 'live')) {
          return micStream
        }
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        return micStream
      }

      function microphoneErrorMessage(err) {
        if (!window.isSecureContext) {
          return 'Mic requires HTTPS or localhost'
        }
        if (!navigator.mediaDevices?.getUserMedia) {
          return 'Microphone is not supported here'
        }
        if (!window.MediaRecorder) {
          return 'Audio recording is not supported here'
        }
        if (err?.name === 'NotAllowedError' || err?.name === 'SecurityError') {
          return 'Microphone permission denied'
        }
        if (err?.name === 'NotFoundError' || err?.name === 'DevicesNotFoundError') {
          return 'No microphone found'
        }
        if (err?.name === 'NotReadableError' || err?.name === 'TrackStartError') {
          return 'Microphone is busy'
        }
        return err?.message || 'Could not start microphone'
      }

      async function startVoiceRecording() {
        if (isRecording.value || uploadInProgress.value) return

        uploadError.value = ''
        isRecording.value = false

        if (!window.isSecureContext || !navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
          uploadError.value = microphoneErrorMessage()
          cleanupRecorder()
          return
        }

        try {
          recordingStream = await getMicStream()
          const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm'

          mediaRecorder = new MediaRecorder(recordingStream, mimeType ? { mimeType } : undefined)
          recordingChunks = []
          recordingSeconds.value = 0

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              recordingChunks.push(event.data)
            }
          }

          mediaRecorder.onerror = () => {
            uploadError.value = 'Recording failed'
            isRecording.value = false
            cleanupRecorder()
          }

          mediaRecorder.start()
          isRecording.value = true
          startRecordingTimer()
        } catch (err) {
          isRecording.value = false
          uploadError.value = microphoneErrorMessage(err)
          cleanupRecorder()
        }
      }

      function cancelVoiceRecording() {
        if (!mediaRecorder) {
          isRecording.value = false
          cleanupRecorder()
          return
        }
        const recorder = mediaRecorder
        recorder.onstop = null
        if (recorder.state !== 'inactive') {
          recorder.stop()
        }
        isRecording.value = false
        cleanupRecorder()
      }

      function finishVoiceRecording() {
        if (!mediaRecorder) {
          isRecording.value = false
          cleanupRecorder()
          return
        }

        const recorder = mediaRecorder
        recorder.onstop = () => {
          const blob = new Blob(recordingChunks, { type: recorder.mimeType || 'audio/webm' })
          const extension = blob.type.includes('ogg') ? 'ogg' : 'webm'
          const file = new File([blob], `voice-note.${extension}`, { type: blob.type || 'audio/webm' })

          isRecording.value = false
          cleanupRecorder()
          uploadFile(file)
        }

        if (recorder.state !== 'inactive') {
          recorder.stop()
        }
      }

      // --- lifecycle ---------------------------------------------------------

      function reconnectIfNeeded() {
        if (!activeSession.value) return
        if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
          cancelReconnect()
          connectWS(activeSession.value)
        }
      }

      function onVisibilityChange() {
        if (document.visibilityState === 'visible') {
          reconnectIfNeeded()
        }
      }

      function onOnline() {
        reconnectIfNeeded()
      }

      function onPopState() {
        routeFromURL()
      }

      onMounted(() => {
        setupTerminal()
        document.addEventListener('visibilitychange', onVisibilityChange)
        window.addEventListener('online', onOnline)
        window.addEventListener('popstate', onPopState)
        ;(async () => {
          await fetchConfig()
          await fetchDirs()
          await routeFromURL()
        })()
        nextTick(() => {
          resizeMobileComposer()
          fitTerminal()
        })
      })

      onBeforeUnmount(() => {
        document.removeEventListener('visibilitychange', onVisibilityChange)
        window.removeEventListener('online', onOnline)
        window.removeEventListener('popstate', onPopState)
        cancelReconnect()
        if (resizeObserver) {
          resizeObserver.disconnect()
          resizeObserver = null
        }
        cancelVoiceRecording()
        stopMicStream()
        if (term) {
          term.dispose()
          term = null
        }
      })

      return {
        dirs, activeSession, defaultSession, connected, harness,
        showNewModal, showAuthModal, newDir, newSessionError, authError, authTokenInput,
        uploadProgress, uploadInProgress, uploadError, uploadStatusText, copied,
        showTextView, textViewContent, textViewStatus,
        isRecording, recordingDurationText, showMobileComposer, mobileComposerText, actionSet,
        terminalEl, mobileComposerEl, newDirInput, imageInputEl,
        statusClass, statusText,
        openDir, stopSession, createFromModal, sendKey, sendText, sendInput, copyTerminal,
        openTextView, closeTextView, copyTextViewSelection, copyTextViewAll,
        triggerImageUpload, handleImageSelected, startVoiceRecording, cancelVoiceRecording,
        finishVoiceRecording, saveHarness, saveAuthToken, resizeMobileComposer, toggleActionSet,
        toggleComposer, sendMobileComposer, insertComposerNewline
      }
    }
  }).mount('#app')
</script>

</body>
</html>
